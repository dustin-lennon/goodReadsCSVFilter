name: Build Executables

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g., v1.1.0)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install

      - name: Build macOS executable
        run: node build-executable.js

      - name: List built files
        run: |
          echo "Files in dist-executable:"
          ls -lah dist-executable/ || echo "No dist-executable directory found"

      - name: Upload macOS artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist-executable/*.dmg
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install

      - name: Build Windows executable
        run: node build-executable.js

      - name: List built files
        run: |
          echo "Files in dist-executable:"
          if (Test-Path dist-executable) {
            dir dist-executable
          } else {
            echo "No dist-executable directory found"
          }

      - name: Upload Windows artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist-executable/*.exe
          tag_name: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false



